<script type="text/javascript">
    RED.nodes.registerType('ccu', {
        category: 'config',
        defaults: {
            ccuHostname: { value: "homematic-ccu", required: true },
            listenAddress: { value: "localhost", required: true },
            bidCosListenPort: { value: 2048, required: true, validate: RED.validators.number() },
            hmIpListenPort: { value: 2049, required: true, validate: RED.validators.number() }
        },
        label: function () {
            return this.ccuHostname + " (" + this.listenAddress + ":" + this.bidCosListenPort + "/" + this.hmIpListenPort + ")";
        }
    });
</script>

<script type="text/html" data-template-name="ccu">
    <div class="form-row">
        <label for="node-config-input-ccuHostname"><i class="fa fa-server"></i> CCU Hostname</label>
        <input type="text" id="node-config-input-ccuHostname">
    </div>
    <div class="form-row">
        <label for="node-config-input-listenAddress"><i class="fa fa-bookmark"></i> Listen Address</label>
        <input type="text" id="node-config-input-listenAddress">
    </div>
    <div class="form-row">
        <label for="node-config-input-bidCosListenPort"><i class="fa fa-bookmark"></i> bidCos Port</label>
        <input type="text" id="node-config-input-bidCosListenPort">
    </div>
    <div class="form-row">
        <label for="node-config-input-hmIpListenPort"><i class="fa fa-bookmark"></i> HM IP Port</label>
        <input type="text" id="node-config-input-hmIpListenPort">
    </div>
</script>
